services:
  streamlit:
    build:
      context: ..
      dockerfile: deploy/streamlit.Dockerfile
    restart: unless-stopped
    environment:
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      OPENCLAW_RESPONSES_URL: ${OPENCLAW_RESPONSES_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-main}
      OPENCLAW_CHAT_USER_PREFIX: ${OPENCLAW_CHAT_USER_PREFIX:-team}
    expose:
      - "8501"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.13.0
    restart: unless-stopped
    depends_on:
      - streamlit
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --upstream=http://streamlit:8501
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails
      - --redirect-url=https://${APP_DOMAIN}/oauth2/callback
      - --cookie-secure=true
      - --cookie-httponly=true
      - --set-xauthrequest=true
      - --reverse-proxy=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --pass-authorization-header=true
      - --scope=openid email profile
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    volumes:
      - ${OAUTH2_PROXY_ALLOWED_EMAILS_FILE}:/etc/oauth2-proxy/allowed-emails:ro
    expose:
      - "4180"

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    depends_on:
      - oauth2-proxy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
