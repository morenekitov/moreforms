services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - /srv/moreforms/runtime/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  streamlit:
    build:
      context: ..
      dockerfile: deploy/streamlit.Dockerfile
    restart: unless-stopped
    env_file:
      - /srv/moreforms/runtime/.env
    environment:
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.13.0
    restart: unless-stopped
    depends_on:
      streamlit:
        condition: service_healthy
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --upstream=http://streamlit:8501
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails
      - --redirect-url=https://${APP_DOMAIN}/oauth2/callback
      - --cookie-secure=true
      - --cookie-httponly=true
      - --set-xauthrequest=true
      - --reverse-proxy=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --pass-authorization-header=true
      - --scope=openid email profile
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    volumes:
      - ${OAUTH2_PROXY_ALLOWED_EMAILS_FILE}:/etc/oauth2-proxy/allowed-emails:ro
    expose:
      - "4180"

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    depends_on:
      - oauth2-proxy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
