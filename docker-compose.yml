services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moreforms
      POSTGRES_USER: moreforms
      POSTGRES_PASSWORD: moreforms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  postgres_data:
